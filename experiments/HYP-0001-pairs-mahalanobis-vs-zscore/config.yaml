experiment_id: HYP-0001-pairs-mahalanobis-vs-zscore
title: Mahalanobis pairs trading versus z-score pairs trading
hypothesis: >
  For intra-sector futures pairs, a Mahalanobis-distance mean-reversion signal
  can identify joint deviations more effectively than a scalar spread z-score
  because it accounts for pair covariance and direction in the two-asset state
  space.

