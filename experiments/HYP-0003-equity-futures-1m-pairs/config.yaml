experiment_id: HYP-0003-equity-futures-1m-pairs
title: GLBX 1-minute equity futures pairs
hypothesis: >
  A broader GLBX equity-index futures universe may expose more relative-value
  structure than the five-root equity-index futures baseline, especially within
  economically related index and sector groups.

data:
  root_dir: /home/famadeo/quant-lab/data/silver/equity_futures_1m_continuous
  roots:
    - ES
    - NQ
    - YM
    - RTY
    - EMD
    - MES
    - MNQ
    - MYM
    - M2K
    - NIY
    - NKD
    - MNI
    - XAE
    - XAF
    - XAK
    - XAP
    - XAV
    - XAY
    - XAB
    - XAU
    - XAI
    - XAR
    - XAZ
  asset_classes:
    MajorIndex: [ES, NQ, YM, RTY, EMD]
    MicroIndex: [MES, MNQ, MYM, M2K]
    JapanIndex: [NIY, NKD, MNI]
    SectorIndex: [XAE, XAF, XAK, XAP, XAV, XAY, XAB, XAU, XAI, XAR, XAZ]
  timestamp_column: ts
  price_column: cont_logprice
  return_column: cont_logret

strategy:
  pair_scope: intra_asset_class
  lookback: 390
  min_pair_observations: 5000
  z_entry: 2.0
  z_exit: 0.5
  mahalanobis_entry: 2.45
  mahalanobis_exit: 1.0
  covariance_ridge: 0.000001
  signal_lag: 1
  rebalance_every_bars: 30
  min_holding_bars: 30
  cooldown_bars: 30
  min_position_change: 0.25

selection:
  enabled: true
  train_fraction: 0.6
  min_train_observations: 5000
  min_test_observations: 2000
  min_abs_return_correlation: 0.1
  max_spread_adf_pvalue: 0.1
  max_half_life_bars: 1950
  min_average_pair_volume: 1
  adf_max_lag: 30

backtest:
  fee_bps: 0.5
  slippage_bps: 1.0
  periods_per_year: 347760

outputs:
  directory: .
  results_file: results.json
  pair_selection_file: pair_selection.csv
  pair_metrics_file: pair_metrics.csv
  portfolio_returns_file: portfolio_returns.parquet
  pair_returns_file: pair_returns.parquet

mlflow:
  experiment_name: quant-lab-pairs
  tracking_uri: sqlite:///mlflow.db

tags:
  workflow: equity-futures-1m-pairs
  data_vendor: databento
  dataset: GLBX.MDP3
  bar_size: 1m
  claim: none

decision:
  status: revise
  notes: Broad GLBX equity futures screen. No trading claim.
