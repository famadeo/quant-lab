experiment_id: "{{EXPERIMENT_ID}}"
title: "{{TITLE}}"
hypothesis: >
  Replace with the falsifiable hypothesis.
conceptual_description: >
  Explain the market intuition, why the relationship might exist, what would
  make it economically meaningful, and what would falsify the idea.

data:
  source: synthetic
  symbol: SYNTH
  start: "2020-01-01"
  end: "2022-12-31"
