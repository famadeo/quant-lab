    owner: famadeo
    notes: Flow-filtered intraday trend underperformed baseline after costs.
  - id: HYP-0010-futures-carry-momentum
    title: Futures carry plus momentum baseline
    status: reject
    owner: famadeo
    notes: Carry, momentum, and combined daily portfolios were negative after costs.
  - id: HYP-0011-expanded-metals-residual-basket
    title: Expanded metals residual mean-reversion basket
    status: revise
    owner: famadeo
    notes: Daily basket passed the initial OOS gate, drawdown controls favored GC/SI/HG/PL, and the 1-minute retest showed the gross signal is swamped by turnover costs.
  - id: HYP-0012-metals-flow-anomaly-framework
    title: Metals cross-sectional flow anomaly framework
    status: research
    owner: famadeo
    notes: Research harness for cross-sectional dollar bars, flow geometry, Mahalanobis anomalies, trade-size flow, and relative-value diagnostics.
  - id: HYP-0013-metals-flow-filtered-residual-reversion
    title: Flow-filtered metals residual mean-reversion strategy
    status: research_pass
    owner: famadeo
    notes: Full 12-month core metals test using flow anomaly and large-minus-small flow filters; passed gross-to-cost and split/bootstrap diagnostics, pending stricter execution and forward validation.
  - id: HYP-0014-metals-flow-filtered-residual-reversion-3y
    title: Three-year core metals flow-filtered residual mean-reversion strategy
    status: research_pass
    owner: famadeo
    notes: Three-year core-only validation passed cost and statistical gates, but PnL is concentrated in the late-2025/2026 active regime.
