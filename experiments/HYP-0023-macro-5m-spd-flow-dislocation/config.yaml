experiment:
  id: HYP-0023-macro-5m-spd-flow-dislocation
  title: 5-minute macro-futures SPD/flow dislocation
  owner: famadeo
  status: research

data:
  futures_5m_dir: /home/famadeo/research/databento-asset-browser/data/futures_5m
  flow_5m_dir: /home/famadeo/research/databento-asset-browser/data/trades
  rth_start: "13:30"
  rth_end: "20:05"

universe:
  roots: [GC, SI, HG, PL, PA, CL, SR3, ZQ, ZT, ZF, ZN, TN, ZB, UB]
  rates_roots: [SR3, ZQ, ZT, ZF, ZN, TN, ZB, UB]
  groups:
    GC: metals
    SI: metals
    HG: metals
    PL: metals
    PA: metals
    CL: energy
    SR3: rates
    ZQ: rates
    ZT: rates
    ZF: rates
    ZN: rates
    TN: rates
    ZB: rates
    UB: rates

regime:
  covariance_lookback_bars: 156
  quantile_lookback_bars: 390
  shrinkage_alpha: 0.15
  eigen_floor: 1.0e-6
  stable_max_spd_velocity_quantile: 0.40
  stable_min_edge_persistence_quantile: 0.60
  transition_min_spd_velocity_quantile: 0.80

residual_model:
  lookback_bars: [156, 390]
  zscore_window_bars: 78
  ridge: 1.0e-3

flow:
  feature: ofi_block
  zscore_window_bars: 78
  flow_z: [0.5, 1.0]

strategy:
  entry_z: [1.0, 1.5, 2.0]
  max_signal_abs: 2.0
  rebalance_bars: [1, 3, 6]
  cost_bps_per_unit_turnover: 1.5
  variants:
    - ungated_residual_reversion
    - stable_residual_reversion
    - stable_flow_confirmed_reversion
    - non_transition_flow_confirmed_reversion
    - transition_flow_momentum
    - flow_only_momentum
    - flow_only_reversion
    - stable_flow_only_reversion
    - non_transition_flow_only_reversion

validation:
  train_fraction_dates: 0.60
  min_train_net_return: 0.0
  min_train_gross_to_cost: 1.0

decision_rules:
  status_if_pass: revise
  status_if_fail: reject
  min_test_net_return: 0.0
  min_test_gross_to_cost: 3.0
  min_test_tstat: 1.65
  require_beats_ungated_control: true

outputs:
  directory: /home/famadeo/quant-lab/experiments/HYP-0023-macro-5m-spd-flow-dislocation
